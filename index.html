            font-weight: bold;
            font-size: 1.1rem;

            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(243, 156, 18, 0.3);
            animation: pulse 1.5s infinite;

            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        #category { 
            font-weight: bold; 
            color: #8e44ad; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }
        #question { 
            font-size: 1.8rem; 
            margin: 10px 0 20px 0; 
            min-height: 80px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #timer { 
            font-size: 4rem; 
            font-weight: bold; 
            margin: 20px 0; 
            color: #e74c3c;
            font-variant-numeric: tabular-nums;
        }
        #answers { 
            text-align: left; 
            display: none; 
            background: #fdfbfb;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            border: 2px solid #eee;
        }
        ol { 
            padding-left: 25px; 
            margin: 10px 0 0 0;
        }
        li { 
            margin-bottom: 10px; 
            font-size: 1.2rem; 
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        li:last-child { border-bottom: none; }
        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        button {
            border: none;
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            color: white;
        }
        button:active { transform: scale(0.95); }
        #next-btn { background-color: #2ecc71; }
        #next-btn:hover { background-color: #27ae60; }
        #show-btn { background-color: #3498db; display: none; }
        #show-btn:hover { background-color: #2980b9; }
        #counter {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        .hidden { display: none !important; }

    let currentCards = [];
    let currentCardIndex = 0;
    let timer;
    let timeLeft = 45;
    let audioCtx = null;

    function shuffleArray(array) {
        let newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
    }

    function playSignal() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        const playTone = (freq, start, duration) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(0.1, start);
            gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(start);
            osc.stop(start + duration);
        };

        const now = audioCtx.currentTime;
        playTone(523.25, now, 0.4); // C5
        playTone(659.25, now + 0.2, 0.4); // E5
        playTone(783.99, now + 0.4, 0.6); // G5
    }

    function initGame() {
        const allCards = [...standardCards, ...trickyCards];
        currentCards = shuffleArray(allCards);
        currentCardIndex = 0;
    }

    function nextCard() {
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        if (currentCards.length === 0) {
            initGame();
        }

        if (currentCardIndex >= currentCards.length) {
            alert("Spelet är slut! Ni har kört alla 200 kort! Blandar om...");
            initGame();
        }

        clearInterval(timer);
        
        const card = currentCards[currentCardIndex];
        
        // Visa eller dölj klurighets-bannern
        if (card.tricky) {
            document.getElementById('tricky-banner').classList.remove('hidden');
        } else {
            document.getElementById('tricky-banner').classList.add('hidden');
        }

        document.getElementById('category').innerText = card.cat;
        document.getElementById('question').innerText = card.q;
        document.getElementById('answers').style.display = 'none';
        document.getElementById('next-btn').innerText = 'Nästa kort';
        document.getElementById('show-btn').style.display = 'inline-block';
        document.getElementById('counter').innerText = `Spelade kort: ${currentCardIndex + 1} / ${currentCards.length}`;

        const list = document.getElementById('answer-list');
        list.innerHTML = "";
        card.a.forEach(item => {
            let li = document.createElement('li');
            li.innerText = item;
            list.appendChild(li);
        });

        currentCardIndex++;
        startTimer();
    }

    function startTimer() {
        timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('timer').style.color = "#e74c3c";

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                triggerAnswers();
                playSignal();
            }
        }, 1000);
    }

    function showAnswersManually() {
        clearInterval(timer);
        triggerAnswers();
    }

    function triggerAnswers() {
        document.getElementById('answers').style.display = 'block';
        document.getElementById('timer').innerText = "TIDEN ÄR UTE";
        document.getElementById('timer').style.color = "#2c3e50";
        document.getElementById('show-btn').style.display = 'none';
    }
</script>
