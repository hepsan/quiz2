            margin: 0;
            background-color: #e0e5ec;
            color: #333;
        }
        #game-container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        #category {

            color: #8e44ad; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }
        #question { 
            font-size: 1.8rem; 
            margin: 20px 0; 
            min-height: 80px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #timer {

            font-weight: bold; 
            margin: 20px 0; 
            color: #e74c3c;
            font-variant-numeric: tabular-nums;
        }
        #answers { 
            text-align: left; 
            display: none; 
            background: #fdfbfb;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            border: 2px solid #eee;
        }
        ol {

            margin: 10px 0 0 0;
        }
        li {

            font-size: 1.2rem; 
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        li:last-child {

        }
        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        button {
            border: none;
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            color: white;
        }
        button:active { transform: scale(0.95); }
        #next-btn { background-color: #2ecc71; }
        #next-btn:hover { background-color: #27ae60; }
        #show-btn { background-color: #3498db; display: none; }
        #show-btn:hover { background-color: #2980b9; }
        #counter {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }

    let currentCards = [];
    let currentCardIndex = 0;
    let timer;
    let timeLeft = 45;

    function shuffleArray(array) {
        let newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
    }

    function initGame() {
        currentCards = shuffleArray(allCards);
        currentCardIndex = 0;
    }

    function nextCard() {
        if (currentCards.length === 0) {
            initGame();
        }

        if (currentCardIndex >= currentCards.length) {
            alert("Nu har ni spelat igenom alla 100 kort! Korten blandas nu om för en ny spelrunda.");
            initGame();
        }

        clearInterval(timer);
        
        const card = currentCards[currentCardIndex];
        
        document.getElementById('category').innerText = card.cat;
        document.getElementById('question').innerText = card.q;
        
        document.getElementById('answers').style.display = 'none';
        document.getElementById('next-btn').innerText = 'Nästa kort';
        document.getElementById('show-btn').style.display = 'inline-block';
        
        document.getElementById('counter').innerText = `Spelade kort: ${currentCardIndex + 1} / ${currentCards.length}`;

        const list = document.getElementById('answer-list');
        list.innerHTML = "";
        card.a.forEach(item => {
            let li = document.createElement('li');
            li.innerText = item;
            list.appendChild(li);
        });

        currentCardIndex++;
        startTimer();
    }

    function startTimer() {
        timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('timer').style.color = "#e74c3c";

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                triggerAnswers();
            }
        }, 1000);
    }

    function showAnswersManually() {
        clearInterval(timer);
        triggerAnswers();
    }

    function triggerAnswers() {
        document.getElementById('answers').style.display = 'block';
        document.getElementById('timer').innerText = "TIDEN ÄR UTE";
        document.getElementById('timer').style.color = "#2c3e50";
        document.getElementById('show-btn').style.display = 'none';
    }
